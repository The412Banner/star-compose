

name: Any branch compilation.

on:
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Clone repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Build JavaSteam and copy JARs to app/libs/steam
      run: |
        git clone --depth 1 -b gamenative-latest https://github.com/joshuatam/JavaSteam javasteam_src
        cd javasteam_src

        # Patch HardwareUtils.java: SystemUtils.IS_OS_ANDROID missing in commons-lang3 3.14.0
        HW_FILE=$(find . -name "HardwareUtils.java" 2>/dev/null | head -1)
        if [ -n "$HW_FILE" ]; then
          sed -i 's/SystemUtils\.IS_OS_ANDROID/false/g' "$HW_FILE"
        fi

        # Patch Utils.java: newer SystemUtils OS fields missing in older commons-lang3
        UTILS_FILE=$(find . -name "Utils.java" -path "*/javasteam/*" 2>/dev/null | head -1)
        if [ -n "$UTILS_FILE" ]; then
          sed -i \
            -e 's/SystemUtils\.IS_OS_MAC_OSX_SONOMA/false/g' \
            -e 's/SystemUtils\.IS_OS_MAC_OSX_VENTURA/false/g' \
            -e 's/SystemUtils\.IS_OS_MAC_OSX_MONTEREY/false/g' \
            -e 's/SystemUtils\.IS_OS_MAC_OSX_BIG_SUR/false/g' \
            -e 's/SystemUtils\.IS_OS_WINDOWS_11/false/g' \
            "$UTILS_FILE"
        fi

        ./gradlew jar --no-daemon 2>&1 | tail -20

        # Find main JAR (contains SteamClient.class)
        MAIN_JAR=""
        for j in $(find . -name "*.jar" -path "*/build/libs/*" \
            | grep -v "sources\|javadoc\|test" | sort); do
          if jar tf "$j" 2>/dev/null | grep -q "SteamClient.class"; then
            MAIN_JAR="$j"
            break
          fi
        done
        if [ -z "$MAIN_JAR" ]; then
          MAIN_JAR=$(find . -name "*.jar" -path "*/build/libs/*" \
            | grep -v "sources\|javadoc\|test" \
            | while read f; do echo "$(wc -c < "$f") $f"; done \
            | sort -rn | head -1 | cut -d' ' -f2-)
        fi
        echo "Main JAR: $MAIN_JAR ($(du -sh "$MAIN_JAR" | cut -f1))"

        # Find DepotDownloader JAR
        DD_JAR=$(find . -name "javasteam-depotdownloader-*.jar" -path "*/build/libs/*" \
          ! -name "*sources*" ! -name "*javadoc*" 2>/dev/null | head -1)

        # Copy to app/libs/steam
        mkdir -p ../app/libs/steam
        cp "$MAIN_JAR" ../app/libs/steam/javasteam.jar

        # protobuf-java
        PROTO_JAR=$(find ~/.gradle/caches -name "protobuf-java-*.jar" \
          ! -name "*sources*" ! -name "*javadoc*" 2>/dev/null | head -1)
        [ -n "$PROTO_JAR" ] && cp "$PROTO_JAR" ../app/libs/steam/protobuf-java.jar

        # commons-lang3
        LANG3_JAR=$(find ~/.gradle/caches -name "commons-lang3-*.jar" \
          ! -name "*sources*" ! -name "*javadoc*" 2>/dev/null | sort -V | tail -1)
        if [ -n "$LANG3_JAR" ]; then
          cp "$LANG3_JAR" ../app/libs/steam/commons-lang3.jar
        else
          wget -q "https://repo1.maven.org/maven2/org/apache/commons/commons-lang3/3.14.0/commons-lang3-3.14.0.jar" \
            -O ../app/libs/steam/commons-lang3.jar
        fi

        # DepotDownloader and its deps
        if [ -n "$DD_JAR" ] && [ -s "$DD_JAR" ]; then
          cp "$DD_JAR" ../app/libs/steam/javasteam-depotdownloader.jar
          GRADLE_CACHE=~/.gradle/caches/modules-2/files-2.1
          gather_jar() {
            local pattern="$1" dest="$2"
            local found
            found=$(find "$GRADLE_CACHE" -name "$pattern" \
              ! -name "*sources*" ! -name "*javadoc*" 2>/dev/null | sort -V | tail -1)
            [ -n "$found" ] && cp "$found" "$dest" && echo "  ✓ $pattern"
          }
          gather_jar "ktor-client-cio-jvm-*.jar"            "../app/libs/steam/ktor-client-cio.jar"
          gather_jar "ktor-client-core-jvm-*.jar"           "../app/libs/steam/ktor-client-core.jar"
          gather_jar "ktor-io-jvm-*.jar"                    "../app/libs/steam/ktor-io.jar"
          gather_jar "ktor-http-jvm-*.jar"                  "../app/libs/steam/ktor-http.jar"
          gather_jar "ktor-utils-jvm-*.jar"                 "../app/libs/steam/ktor-utils.jar"
          gather_jar "ktor-network-jvm-*.jar"               "../app/libs/steam/ktor-network.jar"
          gather_jar "ktor-network-tls-jvm-*.jar"           "../app/libs/steam/ktor-network-tls.jar"
          gather_jar "kotlinx-serialization-json-jvm-*.jar" "../app/libs/steam/kotlinx-serialization-json.jar"
          gather_jar "kotlinx-serialization-core-jvm-*.jar" "../app/libs/steam/kotlinx-serialization-core.jar"
          gather_jar "okio-jvm-*.jar"                       "../app/libs/steam/okio.jar"
          gather_jar "okhttp-jvm-*.jar"                     "../app/libs/steam/okhttp.jar"
          gather_jar "okhttp-coroutines-*.jar"              "../app/libs/steam/okhttp-coroutines.jar"
          gather_jar "kotlinx-io-core-jvm-*.jar"            "../app/libs/steam/kotlinx-io-core.jar"
        fi

        # --- kotlin-compat.jar ---
        # JavaSteam is compiled with Kotlin 2.x which uses classes not present in
        # the app's Kotlin 1.9.0 stdlib.  Extract the missing classes from the 2.x
        # stdlib that Gradle cached while building JavaSteam and bundle them as a
        # small compat JAR that the app's fileTree dependency picks up at runtime.
        #
        # Class needed:
        #   kotlin/coroutines/jvm/internal/SpillingKt  (Kotlin 2.1+, coroutine stack-spilling)
        # Note: kotlin/enums/* is already in kotlin-stdlib-1.9.0, do NOT include it.

        mkdir -p kotlin_compat_staging

        # SpillingKt — in the newest kotlin-stdlib jar in the cache
        KT2_STDLIB=$(find ~/.gradle/caches -name "kotlin-stdlib-*.jar" \
          ! -name "*sources*" ! -name "*javadoc*" ! -name "*metadata*" 2>/dev/null \
          | sort -V | tail -1)
        echo "Kotlin stdlib for compat extraction: $KT2_STDLIB"

        SPILLING="kotlin/coroutines/jvm/internal/SpillingKt.class"
        if [ -n "$KT2_STDLIB" ] && jar tf "$KT2_STDLIB" 2>/dev/null | grep -q "$SPILLING"; then
          cd kotlin_compat_staging
          jar xf "$KT2_STDLIB" "$SPILLING"
          cd ..
          echo "  ✓ SpillingKt.class extracted"
        else
          echo "  ✗ SpillingKt.class not found in cache (login will fail)"
        fi

        # Package into kotlin-compat.jar
        CLASS_COUNT=$(find kotlin_compat_staging -name "*.class" | wc -l)
        if [ "$CLASS_COUNT" -gt 0 ]; then
          cd kotlin_compat_staging
          jar cf ../../app/libs/steam/kotlin-compat.jar $(find . -name "*.class")
          cd ..
          echo "kotlin-compat.jar created: $CLASS_COUNT classes ($(du -sh ../app/libs/steam/kotlin-compat.jar | cut -f1))"
        else
          echo "  ! No compat classes found — kotlin-compat.jar not created"
        fi

        echo "steam libs:"
        ls -lh ../app/libs/steam/

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Attach release in action
      uses: actions/upload-artifact@v4
      with:
       name: compiled-debug
       path: ./app/build/outputs/apk/debug/app-debug.apk

    - name: "Get Short SHA"
      run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

    - name: "Get Version"
      run: echo "VERSION=$(echo $(cat app/build.gradle | grep versionName | head -1 | cut -d '"' -f 2))" >> $GITHUB_ENV

    - name: "List files"
      run: |
        ls -la app/src/main/assets
